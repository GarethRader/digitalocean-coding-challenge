name: Build Docker image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run gofmt check
        run: |
          gofmt -l .

      - name: Run go test
        run: |
          go test ./...

      - name: Run go vet
        run: |
          go vet ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build \
            --file docker/dockerfile.web \
            --tag feature-flag-server:latest \
            .

      - name: Verify image exists
        run: |
          docker images feature-flag-server:latest
